id = "custom.gitbash-agent-detector"
name = "Git Bash Agent Detector"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Detects opencode.exe running under Git-Bash panes (invisible to Herdr's native Windows foreground-process detection) and reports agent state via pane.report_agent."
platforms = ["windows"]

[[events]]
on = "pane.created"
command = ["node", "watcher.mjs"]

# pane.created never fires for panes RESTORED from a prior session on
# server restart (only for genuinely new panes created during the current
# session) - workspace.focused reliably fires shortly after restart as
# Herdr restores focus state, so this is the bootstrap path for the common
# "restart herdr with an existing Git-Bash pane already open" case.
[[events]]
on = "workspace.focused"
command = ["node", "watcher.mjs"]
